<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App keuangan</title>
    <link rel="stylesheet" href="style.css" />

    <!-- icon -->
    <script src="https://unpkg.com/feather-icons"></script>
    <!-- icon end -->

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- fontend -->
  </head>

  <body>
    <header class="navbar">
      <h1>Money Managment</h1>
      <nav class="navbar-nav">
        <a href="#menu">Menu</a>
        <a href="#kategori">Kategori</a>
        <a href="#pengeluaran">Pengeluaran</a>
      </nav>
    </header>

    <!-- ----------------------- hero -----------------------  -->
    <div class="hero" id="hero">
      <h2>Halaman Input</h2>
      <form class="tambah-kategori">
        <h3>Tambah kategori baru</h3>
        <div>
          <input type="text" placeholder="Tambah kategori..." />
          <button type="submit">Tambah</button>
        </div>
      </form>

      <form class="tambah-pengeluaran">
        <h3>Tambah pengeluaran</h3>
        <div class="container-input">
          <label for="inputNilaiPengeluaran">Nilai pengeluaran(Rp)</label>
          <input
            type="text"
            class="input-niali-pengeluaran"
            id="inputNilaiPengeluaran"
            placeholder="Nilai pengeluaran..."
          />
        </div>
        <div class="container-input">
          <label for="PenjelasanPengeluaran">Catatan/Penjelasan</label>
          <input
            type="text"
            class="penjelasan-pengeluaran"
            id="PenjelasanPengeluaran"
            placeholder="Catatan/Penjelasan pengeluaran..."
          />
        </div>
        <label for="kategoriPengeluaran" class="label-select"
          >Pilih kategori pengeluaran:</label
        >
        <select name="" id="kategoriPengeluaran" class="kategori-pengeluaran">
          <option value="makanan">Makanan</option>
          <option value="hiburan">Hiburan</option>
          <option value="pendidikan">Pendidikan</option>
        </select>
      </form>
    </div>
    <!-- ----------------------- hero end -----------------------  -->

    <!-- ----------------------- kategori  -----------------------  -->
    <div class="kategori" id="kategori">
      <h2>Kategori</h2>
      
      
    </div>
    <!-- ----------------------- kategori end -----------------------  -->

    <!-- ----------------------- kategori end -----------------------  -->
    <div class="pengeluaran" id="pengeluaran">
      <h2>List pengeluaran</h2>
    </div>
    <!-- ----------------------- kategori end -----------------------  -->

    <script>
      feather.replace();
    </script>
    <script src="sctipt.js"></script>
  </body>
</html>
