<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory App</title>
    <link rel="stylesheet" href="style.css">

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- font end -->

</head>
<body>
    
    <header class="header">
        <h1>Inventory Manager</h1>
        <p>Manage your storage product</p>
    </header>
    
<div class="container">
<main>

    <!-- ----------------------- produck-list-area ---------------------------------------- -->
    <section class="produck-list-area">
        <h2>Product List</h2>

        <form class="search">
            <input  name="search-input" placeholder="Search Product" id="searchInput" class="search-input">
            <button id="btnSearch" class="btn-search">Search</button>
        </form>

        <form class="sort">
            <article>
                <input type="radio" value="all" name="sort" id="all" checked>
                <label for="all">All</label>
            </article>
                
            <article>
                <input type="radio" value="low-stock" name="sort" id="lowStock">
                <label for="lowStock">Low stock</label>
            </article>

            <article>
                <input type="radio" value="out-of-stock" name="sort" id="outOfStock">
                <label for="outOfStock">Out of stock</label>
            </article>
        </form>
        
        <section id="ProductList" class="product-list">
            <h3 id="listTitle" class="list-title">All Product</h3>

            <div class="list-header">
                <p class="list-header-id">ID</p>
                <p class="list-header-name">Name</p>
                <p class="list-header-stock">Stock</p>
                <p class="list-header-action">Action</p>
            </div>

            <div id="containerList" class="container-list">
            <!-- ------------------------ list product ---- -->
                <!-- <article class="product">
                    <p class="product-id">23</p>
                    <p class="product-name">Product Name</p>
                    <p class="product-stock">84</p>
                    <div class="product-action">
                        <button class="increase">+</button>
                        <button class="decrease">-</button>
                        <button class="delete">Delete</button>
                    </div>
                </article> -->

            <!-- ------------------------ list product end---- -->
            </div>

        </section>
    </section>
    <!-- ----------------------- produck-list-area End---------------------------------------- -->
    




    <!-- ----------------------- add-product-area ---------------------------------------- -->
    <section class="add-product-area">
        <h2>Add Product</h2>
        <form class="add-product">
            
            <article>
            <label for="product-name-input">Product name:</label>
            <input type="text" name="product-name-input" placeholder="Product Name" required id="productNameInput">
            </article>

            <article>
            <label for="stoct-input">stock:</label>
            <input type="text" name="stoct-input" placeholder="Stock" id="stockInput" class="stoct-input"> 
            </article>

            <button type="submit" id="btnAddProduct" class="btn-add-product">Add Product</button>

        </form>
    </section>
    <!-- ----------------------- add-product-area End---------------------------------------- -->
</main>
</div>

<footer>
    <p>© 2026 Muhammad Ihdal</p>
</footer>





    <script src="script.js"></script>
</body>
</html>
